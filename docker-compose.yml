services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vinted}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vinted}
      POSTGRES_DB: ${POSTGRES_DB:-vinted_tracker}
    volumes:
      - pgdata:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - max_connections=20
      - -c
      - shared_buffers=64MB
      - -c
      - work_mem=4MB
      - -c
      - maintenance_work_mem=32MB
      - -c
      - effective_cache_size=128MB
      - -c
      - wal_buffers=4MB
      - -c
      - max_wal_size=128MB
      - -c
      - min_wal_size=32MB
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vinted} -d ${POSTGRES_DB:-vinted_tracker}"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 256m
    mem_reservation: 128m

  api:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-vinted}:${POSTGRES_PASSWORD:-vinted}@db:5432/${POSTGRES_DB:-vinted_tracker}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
    mem_limit: 192m
    mem_reservation: 96m

  worker:
    build: ./backend
    restart: unless-stopped
    command: ["python", "-m", "app.worker"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-vinted}:${POSTGRES_PASSWORD:-vinted}@db:5432/${POSTGRES_DB:-vinted_tracker}
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
    mem_limit: 192m
    mem_reservation: 96m

  web:
    build:
      context: ./frontend
      args:
        VITE_API_KEY: ${API_KEY:-change-me}
        VITE_ENABLE_VINTED: ${ENABLE_VINTED:-false}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"
    mem_limit: 64m
    mem_reservation: 32m

volumes:
  pgdata:
